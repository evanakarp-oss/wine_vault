<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" font-family="Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect width="1000" height="1500" fill="#f8f5ee"/>

  <!-- title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">The Vosne Adjacency — Côte de Nuits</text>
  <text x="500" y="60" text-anchor="middle" font-size="13" fill="#666">Vougeot · Flagey-Échezeaux · Vosne-Romanée · Nuits-Saint-Georges</text>
  <text x="500" y="78" text-anchor="middle" font-size="11" fill="#999">north ↑ · hillside rises west ← · plain &amp; RN74 east →</text>

  <!-- compass -->
  <text x="50" y="115" font-size="13" font-weight="bold" fill="#444">N ↑</text>

  <!-- HILLSIDE (forest, west edge) -->
  <rect x="80" y="100" width="80" height="1100" fill="#7a8b5a" opacity="0.40"/>
  <text x="120" y="650" font-size="11" fill="#3a4a20" text-anchor="middle" transform="rotate(-90, 120, 650)">Hauts · forest · 400 m</text>

  <!-- VINEYARD ZONE (mid) -->
  <rect x="160" y="100" width="500" height="1100" fill="#dee2bb" opacity="0.55"/>

  <!-- GRAND-CRU BAND (upper slope, darker) -->
  <rect x="200" y="100" width="180" height="1100" fill="#6f8546" opacity="0.45"/>

  <!-- band labels -->
  <text x="290" y="115" text-anchor="middle" font-size="9" font-weight="bold" fill="#2a3a10" letter-spacing="2">GRAND CRU SLOPE</text>
  <text x="490" y="115" text-anchor="middle" font-size="9" font-weight="bold" fill="#555" letter-spacing="2">1ER CRU · VILLAGE</text>

  <!-- PLAIN + RN74 -->
  <rect x="660" y="100" width="220" height="1100" fill="#e6d6a0" opacity="0.35"/>
  <line x1="720" y1="100" x2="720" y2="1200" stroke="#aa9955" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="735" y="650" font-size="11" fill="#aa9955" transform="rotate(-90, 735, 650)">RN74 · plain · towns</text>

  <!-- =============================== COMMUNES =============================== -->

  <!-- ============ VOUGEOT (y 100-220) ============ -->
  <line x1="160" y1="220" x2="880" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="170" y="118" font-size="11" fill="#666" font-style="italic">↑ Chambolle-Musigny</text>
  <text x="500" y="150" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">VOUGEOT</text>
  <text x="290" y="180" text-anchor="middle" font-size="10" fill="#2a3a10" font-style="italic">Clos de Vougeot GC</text>
  <text x="290" y="195" text-anchor="middle" font-size="9" fill="#2a3a10" font-style="italic">(50 ha · 80+ owners)</text>
  <text x="500" y="195" text-anchor="middle" font-size="9" fill="#666">Les Cras 1er</text>

  <!-- ============ FLAGEY-ÉCHEZEAUX (y 220-450) ============ -->
  <line x1="160" y1="450" x2="880" y2="450" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="260" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">FLAGEY-ÉCHEZEAUX</text>
  <text x="500" y="278" text-anchor="middle" font-size="10" fill="#666" font-style="italic">(commune sits east of N74 — GCs are on the Vosne slope)</text>
  <text x="290" y="320" text-anchor="middle" font-size="11" fill="#2a3a10" font-style="italic">Échezeaux GC</text>
  <text x="290" y="340" text-anchor="middle" font-size="11" fill="#2a3a10" font-style="italic">Grands-Échezeaux GC</text>
  <text x="800" y="400" text-anchor="middle" font-size="10" fill="#888">village →</text>

  <!-- ============ VOSNE-ROMANÉE (y 450-720) ============ -->
  <line x1="160" y1="720" x2="880" y2="720" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="490" text-anchor="middle" font-size="21" font-weight="bold" fill="#222">VOSNE-ROMANÉE</text>
  <text x="500" y="508" text-anchor="middle" font-size="10" fill="#666" font-style="italic">"there are no common wines in Vosne" — Camille Rodier</text>

  <!-- Vosne grand crus -->
  <text x="290" y="540" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2a05">★ Romanée-Conti</text>
  <text x="290" y="558" text-anchor="middle" font-size="10" fill="#2a3a10" font-style="italic">La Tâche · La Romanée</text>
  <text x="290" y="576" text-anchor="middle" font-size="10" fill="#2a3a10" font-style="italic">Richebourg</text>
  <text x="290" y="594" text-anchor="middle" font-size="10" fill="#2a3a10" font-style="italic">Romanée-St-Vivant</text>
  <text x="290" y="612" text-anchor="middle" font-size="10" fill="#2a3a10" font-style="italic">La Grande Rue</text>

  <!-- Vosne 1ers -->
  <text x="500" y="555" text-anchor="middle" font-size="9" fill="#444">Cros Parantoux · Les Brûlées</text>
  <text x="500" y="572" text-anchor="middle" font-size="9" fill="#444">Les Suchots · Les Beaux Monts</text>
  <text x="500" y="589" text-anchor="middle" font-size="9" fill="#444">Aux Malconsorts · Les Chaumes</text>
  <text x="500" y="606" text-anchor="middle" font-size="9" fill="#444">Les Rouges du Dessus</text>
  <text x="800" y="640" text-anchor="middle" font-size="10" fill="#888">village →</text>

  <!-- ============ NSG (y 720-1200) ============ -->
  <text x="500" y="755" text-anchor="middle" font-size="21" font-weight="bold" fill="#222">NUITS-SAINT-GEORGES</text>
  <text x="500" y="772" text-anchor="middle" font-size="10" fill="#666" font-style="italic">long commune — Vosne-side 1ers north · Prémeaux 1ers south · no GCs</text>

  <!-- NSG north (Vosne-side) -->
  <line x1="200" y1="830" x2="660" y2="830" stroke="#bbb" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="500" y="820" text-anchor="middle" font-size="10" font-style="italic" fill="#555">— north (Vosne border) —</text>
  <text x="430" y="855" text-anchor="middle" font-size="9" fill="#444">Aux Boudots · Aux Thorey · Les Damodes</text>
  <text x="430" y="870" text-anchor="middle" font-size="9" fill="#444">Aux Cras · Aux Murgers</text>

  <!-- NSG town -->
  <line x1="200" y1="970" x2="660" y2="970" stroke="#bbb" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="500" y="960" text-anchor="middle" font-size="10" font-style="italic" fill="#555">— town —</text>
  <text x="430" y="995" text-anchor="middle" font-size="9" fill="#444">Les Saint-Georges · Les Cailles</text>
  <text x="430" y="1010" text-anchor="middle" font-size="9" fill="#444">Vaucrains · Les Pruliers</text>
  <text x="800" y="990" text-anchor="middle" font-size="10" fill="#888">Nuits town →</text>

  <!-- NSG south / Prémeaux -->
  <line x1="200" y1="1110" x2="660" y2="1110" stroke="#bbb" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="500" y="1100" text-anchor="middle" font-size="10" font-style="italic" fill="#555">— south · Prémeaux-Prissey —</text>
  <text x="430" y="1135" text-anchor="middle" font-size="9" fill="#444">Clos de la Maréchale (Mugnier monopole)</text>
  <text x="430" y="1150" text-anchor="middle" font-size="9" fill="#444">Clos des Corvées · Clos de l'Arlot</text>
  <text x="430" y="1165" text-anchor="middle" font-size="9" fill="#444">Clos de la Maréchale · Aux Perdrix</text>

  <line x1="160" y1="1200" x2="880" y2="1200" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="170" y="1218" font-size="11" fill="#666" font-style="italic">↓ Côte de Nuits-Villages / Comblanchien</text>

  <!-- =============================== PINS =============================== -->

  <!-- OWNED (red) -->
  <!-- O3 Brisset Vosne 1er Les Rouges du Dessus (upper Vosne, near Flagey border) -->
  <circle cx="360" cy="615" r="11" fill="#c0392b" stroke="white" stroke-width="2"/>
  <text x="360" y="619" text-anchor="middle" font-size="11" fill="white" font-weight="bold">3</text>

  <!-- O4 Odoul-Coquard Vosne VV (village level) -->
  <circle cx="565" cy="640" r="11" fill="#c0392b" stroke="white" stroke-width="2"/>
  <text x="565" y="644" text-anchor="middle" font-size="11" fill="white" font-weight="bold">4</text>

  <!-- O2 Brisset NSG Aux Thorey (north NSG) -->
  <circle cx="440" cy="885" r="11" fill="#c0392b" stroke="white" stroke-width="2"/>
  <text x="440" y="889" text-anchor="middle" font-size="11" fill="white" font-weight="bold">2</text>

  <!-- O1 Mugnier NSG Clos de la Maréchale (south Prémeaux) - the anchor, larger -->
  <circle cx="330" cy="1145" r="14" fill="#c0392b" stroke="white" stroke-width="3"/>
  <text x="330" y="1150" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1</text>

  <!-- O5 Ponnelle NSG Clos des Corvées (south Prémeaux) -->
  <circle cx="375" cy="1175" r="11" fill="#c0392b" stroke="white" stroke-width="2"/>
  <text x="375" y="1179" text-anchor="middle" font-size="11" fill="white" font-weight="bold">5</text>

  <!-- RAEDERS SHORTLIST (blue) -->
  <!-- R-C Bertagna Vougeot Les Cras 1er -->
  <circle cx="470" cy="195" r="11" fill="#2980b9" stroke="white" stroke-width="2"/>
  <text x="470" y="199" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C</text>

  <!-- R-E Lamarche Échezeaux GC -->
  <circle cx="325" cy="335" r="11" fill="#2980b9" stroke="white" stroke-width="2"/>
  <text x="325" y="339" text-anchor="middle" font-size="11" fill="white" font-weight="bold">E</text>

  <!-- R-D Bertagna Vosne Les Beaux Monts (northern Vosne 1er) -->
  <circle cx="435" cy="575" r="11" fill="#2980b9" stroke="white" stroke-width="2"/>
  <text x="435" y="579" text-anchor="middle" font-size="11" fill="white" font-weight="bold">D</text>

  <!-- R-A Henri Gouges NSG (town/central) -->
  <circle cx="510" cy="1010" r="11" fill="#2980b9" stroke="white" stroke-width="2"/>
  <text x="510" y="1014" text-anchor="middle" font-size="11" fill="white" font-weight="bold">A</text>

  <!-- R-B Mugnier Clos de la Maréchale 2022 (same monopole as O1) -->
  <circle cx="305" cy="1145" r="11" fill="#2980b9" stroke="white" stroke-width="2"/>
  <text x="305" y="1149" text-anchor="middle" font-size="11" fill="white" font-weight="bold">B</text>

  <!-- =============================== LEGEND =============================== -->
  <rect x="60" y="1240" width="880" height="240" fill="white" stroke="#aaa"/>

  <!-- Owned legend -->
  <circle cx="80" y="1265" r="8" fill="#c0392b"/>
  <circle cx="80" cy="1265" r="8" fill="#c0392b"/>
  <text x="98" y="1270" font-size="14" font-weight="bold" fill="#c0392b">Owned — 5 cuvées · 11 bottles</text>

  <text x="80" y="1295" font-size="11" fill="#222"><tspan font-weight="bold">1</tspan>  Jacques-Frédéric Mugnier  ·  NSG 1er Clos de la Maréchale 2018  ·  ×4  ·  $135  ·  drink 2033–2065  ★ anchor</text>
  <text x="80" y="1312" font-size="11" fill="#222"><tspan font-weight="bold">2</tspan>  Maison Pierre Brisset  ·  NSG 1er Aux Thorey 2023  ·  ×2  ·  $95  ·  2028–2043</text>
  <text x="80" y="1329" font-size="11" fill="#222"><tspan font-weight="bold">3</tspan>  Maison Pierre Brisset  ·  Vosne 1er Les Rouges du Dessus 2023  ·  ×3  ·  $175  ·  2029–2046</text>
  <text x="80" y="1346" font-size="11" fill="#222"><tspan font-weight="bold">4</tspan>  Domaine Odoul-Coquard  ·  Vosne-Romanée Vieilles Vignes 2021  ·  ×1  ·  $162  ·  2024–2036</text>
  <text x="80" y="1363" font-size="11" fill="#222"><tspan font-weight="bold">5</tspan>  Pierre Ponnelle  ·  NSG 1er Clos des Corvées 1983  ·  ×1  ·  $99 (now $35, mature)</text>

  <!-- Raeders legend -->
  <circle cx="80" cy="1395" r="8" fill="#2980b9"/>
  <text x="98" y="1400" font-size="14" font-weight="bold" fill="#2980b9">Raeders shortlist — 5 picks (curation-filtered)</text>

  <text x="80" y="1425" font-size="11" fill="#222"><tspan font-weight="bold">A</tspan>  Domaine Henri Gouges  ·  NSG 2017  ·  <tspan font-weight="bold">$80</tspan>  ·  WS 93  ·  ★ best value / historic NSG grower</text>
  <text x="80" y="1442" font-size="11" fill="#222"><tspan font-weight="bold">B</tspan>  Jacques-Frédéric Mugnier  ·  NSG 1er Clos de la Maréchale 2022  ·  <tspan font-weight="bold">$230</tspan>  ·  deepen anchor position</text>
  <text x="80" y="1459" font-size="11" fill="#222"><tspan font-weight="bold">C</tspan>  Domaine Bertagna  ·  Vougeot Les Cras 1er Cru 2022  ·  <tspan font-weight="bold">$150</tspan>  ·  domaine on home turf</text>
  <text x="80" y="1476" font-size="11" fill="#222"><tspan font-weight="bold">D</tspan>  Bertagna  ·  Vosne-Romanée Les Beaux Monts 2022  ·  <tspan font-weight="bold">$140</tspan>  ·  rare Vosne 1er &lt;$150</text>

  <text x="510" y="1476" font-size="11" fill="#222"><tspan font-weight="bold">E</tspan>  Nicole Lamarche  ·  Échezeaux GC 2020  ·  <tspan font-weight="bold">$280</tspan>  ·  GC &lt;$300</text>
</svg>
