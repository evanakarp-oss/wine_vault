name: check

# Validates that wiki/index.md is up to date with the current vault contents
# and that wiki/log.md entries follow the canonical `## [YYYY-MM-DD] op | title`
# format. See ## Operations in CLAUDE.md for the full pattern.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build_wiki_log.py reads git history; full clone keeps the
          # validation in lockstep with what someone running locally sees.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: wiki/index.md is up to date with vault contents
        run: python scripts/build_wiki_index.py --check

      - name: wiki/log.md entries follow canonical format
        run: python scripts/build_wiki_log.py --check

      - name: generated views are up to date (index, signals, ratings board)
        run: |
          python scripts/build_views_index.py --check
          python scripts/build_signals.py --check
          python scripts/build_ratings_board.py --check

      - name: every auction catalog is landed (no unparsed weeks)
        # Drift guard: fails if a catalog dropped in raw/auctions/ has no
        # corresponding raw/ratings/ JSON. Prevents the recurrence of only
        # the newest week being parsed while earlier weeks silently rot.
        run: python scripts/parse_auction_ratings.py --check

      - name: producer schema + taxonomy lint passes clean
        # Strict gate: any new region taxonomy violation, mojibake
        # filename, surname collision (without aliases), or producer
        # page missing frontmatter fails the build. Was at 66 issues on
        # 2026-05-26; cleaned to 0 by scripts/fix_vault_architecture.py.
        run: |
          python scripts/lint.py
          count=$(grep -E "^total_issues:" build/lint_report.md | awk '{print $2}')
          if [ "$count" -ne 0 ]; then
            echo "::error::lint surfaced $count issue(s) — see build/lint_report.md"
            exit 1
          fi
