name: check

# Validates that wiki/index.md is up to date with the current vault contents
# and that wiki/log.md entries follow the canonical `## [YYYY-MM-DD] op | title`
# format. See ## Operations in CLAUDE.md for the full pattern.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build_wiki_log.py reads git history; full clone keeps the
          # validation in lockstep with what someone running locally sees.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PyYAML
        run: pip install pyyaml

      - name: wiki/index.md is up to date with vault contents
        run: python scripts/build_wiki_index.py --check

      - name: wiki/log.md entries follow canonical format
        run: python scripts/build_wiki_log.py --check
