name: drive_mirror

# Mirrors the git repository to the canonical Google Drive `wine_vault/`
# folder on every push to main. Git is the source of truth; Drive becomes
# a read-only output (so Obsidian / claude.ai / the iOS Drive app can
# browse the latest state without having to clone the repo).
#
# Requires the `GDRIVE_SERVICE_ACCOUNT_JSON` repo secret — a Google
# service-account JSON key with the Drive API enabled. The service
# account email must be shared as an editor on the wine_vault Drive
# folder (folder ID `1lqMRm9PiLel19kGC7FAZgd-2cHu2CZBB`). See WORKFLOW.md
# for one-time setup.
#
# Trigger: push to main, or manual via the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (rclone --dry-run; no Drive writes)"
        type: boolean
        default: false

# A single in-flight mirror at a time. Newer pushes cancel older runs so
# Drive never lags behind main.
concurrency:
  group: drive_mirror
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Write service-account credentials
        env:
          SA_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::GDRIVE_SERVICE_ACCOUNT_JSON repo secret not set. See WORKFLOW.md for setup."
            exit 1
          fi
          mkdir -p "$HOME/.config/rclone"
          echo "$SA_JSON" > "$HOME/.config/rclone/sa.json"
          cat > "$HOME/.config/rclone/rclone.conf" <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = $HOME/.config/rclone/sa.json
          root_folder_id = 1lqMRm9PiLel19kGC7FAZgd-2cHu2CZBB
          EOF
          chmod 600 "$HOME/.config/rclone/sa.json"

      - name: Mirror repo → Drive (git is source of truth)
        env:
          DRY: ${{ github.event.inputs.dry_run }}
        run: |
          # --exclude patterns mirror .driveignore + repo metadata.
          # The `.git/` directory itself is never synced (no one wants
          # a 500MB .git tree mirrored to Drive).
          DRY_FLAG=""
          if [ "$DRY" = "true" ]; then DRY_FLAG="--dry-run"; fi
          rclone sync . gdrive: \
            --exclude '.git/**' \
            --exclude '.github/**' \
            --exclude 'build/**' \
            --exclude '__pycache__/**' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude 'Thumbs.db' \
            --exclude '_drive_sync/**' \
            --exclude 'wiki/wiki/**' \
            --exclude 'wine_vault_fromdocuments/**' \
            --create-empty-src-dirs \
            --fast-list \
            --transfers 8 \
            --checkers 16 \
            $DRY_FLAG \
            --stats 30s \
            --stats-one-line

      - name: Summary
        if: always()
        run: |
          echo "Mirrored commit ${GITHUB_SHA:0:7} to Drive."
          echo "Drive folder: https://drive.google.com/drive/folders/1lqMRm9PiLel19kGC7FAZgd-2cHu2CZBB"
